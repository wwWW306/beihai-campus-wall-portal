<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园墙 - 分享你的校园生活</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+SC:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ================================================
           专业设计系统
           基于 Frontend Design Pro 规范
           ================================================ */
        
        :root {
            /* 字体 */
            --font-display: 'Cormorant Garamond', 'Noto Sans SC', Georgia, serif;
            --font-body: 'Noto Sans SC', 'DM Sans', sans-serif;
            
            /* 校园学院风配色 */
            --cream: #FAF8F5;
            --warm-white: #FFFFFF;
            --stone-100: #F5F3F0;
            --stone-200: #E8E4DF;
            --stone-300: #D4CFC8;
            --stone-500: #9A958E;
            --stone-700: #5C5750;
            --stone-900: #2D2A26;
            
            /* 强调色 - 学院红 */
            --burgundy: #8B4557;
            --rose: #C4836A;
            --terracotta: #D4856A;
            --sand: #E8D5C4;
            
            /* 功能色 */
            --accent: #B85C50;
            --success: #6B8E6B;
            --info: #6B7B8E;
            
            /* 动效 */
            --ease-elegant: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --duration-fast: 150ms;
            --duration-normal: 250ms;
            --duration-slow: 400ms;
            
            /* 阴影 */
            --shadow-xs: 0 1px 2px rgba(45, 42, 38, 0.04);
            --shadow-sm: 0 2px 8px rgba(45, 42, 38, 0.06);
            --shadow-md: 0 8px 24px rgba(45, 42, 38, 0.08);
            --shadow-lg: 0 16px 48px rgba(45, 42, 38, 0.1);
            --shadow-xl: 0 24px 64px rgba(45, 42, 38, 0.12);
            
            /* 间距 */
            --space-xs: 8px;
            --space-sm: 16px;
            --space-md: 24px;
            --space-lg: 40px;
            --space-xl: 64px;
            
            /* 圆角 */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --radius-full: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            font-size: 16px;
            line-height: 1.7;
            color: var(--stone-900);
            background: var(--cream);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        a { color: inherit; text-decoration: none; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; }
        
        /* ================================================
           布局系统
           ================================================ */
        
        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--space-md);
        }

        /* ================================================
           头部导航
           ================================================ */
        
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(250, 248, 245, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--stone-200);
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--space-md);
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .logo-mark {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--burgundy) 0%, var(--rose) 100%);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 500;
            box-shadow: var(--shadow-sm);
        }

        .logo-text {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--stone-900);
            letter-spacing: -0.02em;
        }

        .logo-sub {
            font-size: 0.75rem;
            color: var(--stone-500);
            font-weight: 400;
            margin-top: -2px;
        }

        /* ================================================
           主内容区
           ================================================ */
        
        .main {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: var(--space-lg);
            padding: var(--space-lg) 0;
        }

        @media (max-width: 900px) {
            .main { grid-template-columns: 1fr; }
            .sidebar { order: -1; }
        }

        /* ================================================
           发帖卡片
           ================================================ */
        
        .compose-card {
            background: var(--warm-white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            padding: var(--space-lg);
            margin-bottom: var(--space-lg);
            border: 1px solid var(--stone-100);
            transition: all var(--duration-normal) var(--ease-elegant);
        }

        .compose-card:focus-within {
            box-shadow: var(--shadow-lg);
            border-color: var(--sand);
        }

        .compose-header {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin-bottom: var(--space-md);
        }

        .compose-avatar {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--sand) 0%, var(--rose) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: var(--font-display);
            font-size: 1.2rem;
        }

        .compose-title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--stone-900);
        }

        .compose-subtitle {
            font-size: 0.8125rem;
            color: var(--stone-500);
        }

        /* 分类选择 */
        .category-tabs {
            display: flex;
            gap: var(--space-xs);
            margin-bottom: var(--space-md);
            overflow-x: auto;
            padding-bottom: var(--space-xs);
        }

        .category-tab {
            padding: 8px 18px;
            border-radius: var(--radius-full);
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--stone-700);
            background: var(--stone-100);
            border: 1px solid transparent;
            transition: all var(--duration-fast) var(--ease-elegant);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .category-tab:hover {
            background: var(--stone-200);
            transform: translateY(-1px);
        }

        .category-tab.active {
            background: var(--burgundy);
            color: white;
            box-shadow: 0 2px 8px rgba(139, 69, 87, 0.25);
        }

        /* 输入框 */
        .compose-input {
            width: 100%;
            min-height: 100px;
            padding: var(--space-sm);
            border: 1px solid var(--stone-200);
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: 1rem;
            line-height: 1.7;
            color: var(--stone-900);
            background: var(--cream);
            resize: vertical;
            transition: all var(--duration-fast) var(--ease-elegant);
        }

        .compose-input:focus {
            outline: none;
            border-color: var(--rose);
            background: var(--warm-white);
            box-shadow: 0 0 0 3px rgba(196, 131, 106, 0.1);
        }

        .compose-input::placeholder {
            color: var(--stone-500);
        }

        /* 发布栏 */
        .compose-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: var(--space-sm);
            padding-top: var(--space-sm);
            border-top: 1px solid var(--stone-100);
        }

        .compose-tools {
            display: flex;
            gap: var(--space-xs);
        }

        .compose-tool {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--stone-500);
            transition: all var(--duration-fast) var(--ease-elegant);
        }

        .compose-tool:hover {
            background: var(--stone-100);
            color: var(--burgundy);
        }

        .char-count {
            font-size: 0.8125rem;
            color: var(--stone-500);
            font-variant-numeric: tabular-nums;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 28px;
            font-family: var(--font-display);
            font-size: 0.9375rem;
            font-weight: 500;
            border-radius: var(--radius-full);
            border: none;
            cursor: pointer;
            transition: all var(--duration-normal) var(--ease-elegant);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--burgundy) 0%, var(--rose) 100%);
            color: white;
            box-shadow: 0 4px 16px rgba(139, 69, 87, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(139, 69, 87, 0.35);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* ================================================
           排序栏
           ================================================ */
        
        .sort-bar {
            display: flex;
            gap: var(--space-xs);
            margin-bottom: var(--space-md);
            padding-bottom: var(--space-sm);
            border-bottom: 1px solid var(--stone-100);
        }

        .sort-btn {
            padding: 8px 20px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--stone-500);
            border-radius: var(--radius-full);
            transition: all var(--duration-fast) var(--ease-elegant);
        }

        .sort-btn:hover {
            color: var(--stone-900);
            background: var(--stone-100);
        }

        .sort-btn.active {
            color: var(--burgundy);
            background: rgba(139, 69, 87, 0.08);
        }

        /* ================================================
           帖子卡片
           ================================================ */
        
        .posts {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .post-card {
            background: var(--warm-white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-sm);
            padding: var(--space-lg);
            border: 1px solid var(--stone-100);
            transition: all var(--duration-normal) var(--ease-elegant);
            animation: fadeUp var(--duration-slow) var(--ease-elegant);
        }

        .post-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-sm);
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--sand) 0%, var(--rose) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: var(--font-display);
            font-size: 1.1rem;
        }

        .post-meta {
            display: flex;
            flex-direction: column;
        }

        .post-category {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(139, 69, 87, 0.08);
            color: var(--burgundy);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 500;
        }

        .post-time {
            font-size: 0.8125rem;
            color: var(--stone-500);
        }

        .post-content {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--stone-900);
            margin-bottom: var(--space-md);
            white-space: pre-wrap;
        }

        .post-actions {
            display: flex;
            gap: var(--space-sm);
            padding-top: var(--space-sm);
            border-top: 1px solid var(--stone-100);
        }

        .post-action {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            font-size: 0.875rem;
            color: var(--stone-500);
            border-radius: var(--radius-full);
            transition: all var(--duration-fast) var(--ease-elegant);
        }

        .post-action:hover {
            background: var(--stone-100);
            color: var(--stone-700);
        }

        .post-action.liked {
            color: var(--accent);
        }

        .post-action.liked:hover {
            background: rgba(184, 92, 80, 0.1);
        }

        .action-icon {
            font-size: 1rem;
            transition: transform var(--duration-fast) var(--ease-elegant);
        }

        .post-action:hover .action-icon {
            transform: scale(1.1);
        }

        /* ================================================
           评论区
           ================================================ */
        
        .comments {
            margin-top: var(--space-md);
            padding-top: var(--space-md);
            border-top: 1px solid var(--stone-100);
            display: none;
        }

        .comments.show {
            display: block;
            animation: fadeUp var(--duration-normal) var(--ease-elegant);
        }

        .comment-input-row {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: var(--space-md);
        }

        .comment-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--stone-200);
            border-radius: var(--radius-full);
            font-family: var(--font-body);
            font-size: 0.9375rem;
            transition: all var(--duration-fast) var(--ease-elegant);
        }

        .comment-input:focus {
            outline: none;
            border-color: var(--rose);
            box-shadow: 0 0 0 3px rgba(196, 131, 106, 0.1);
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .comment-item {
            padding: var(--space-sm);
            background: var(--stone-100);
            border-radius: var(--radius-md);
            font-size: 0.9375rem;
        }

        .comment-time {
            font-size: 0.75rem;
            color: var(--stone-500);
            margin-top: 4px;
        }

        /* ================================================
           侧边栏
           ================================================ */
        
        .sidebar {
            position: sticky;
            top: 96px;
            height: fit-content;
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .widget {
            background: var(--warm-white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-sm);
            padding: var(--space-lg);
            border: 1px solid var(--stone-100);
        }

        .widget-title {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--stone-900);
            margin-bottom: var(--space-md);
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .widget-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--burgundy) 0%, var(--rose) 100%);
            border-radius: 2px;
        }

        /* 统计网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-sm);
        }

        .stat-card {
            padding: var(--space-sm);
            background: var(--cream);
            border-radius: var(--radius-md);
            text-align: center;
            transition: all var(--duration-fast) var(--ease-elegant);
        }

        .stat-card:hover {
            background: var(--stone-100);
            transform: translateY(-2px);
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--burgundy);
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.8125rem;
            color: var(--stone-500);
            margin-top: 2px;
        }

        /* 热门话题 */
        .hot-tags {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-xs);
        }

        .hot-tag {
            padding: 8px 16px;
            background: var(--stone-100);
            border-radius: var(--radius-full);
            font-size: 0.875rem;
            color: var(--stone-700);
            transition: all var(--duration-fast) var(--ease-elegant);
            border: none;
            cursor: pointer;
        }

        .hot-tag:hover {
            background: var(--burgundy);
            color: white;
            transform: translateY(-2px);
        }

        /* ================================================
           空状态
           ================================================ */
        
        .empty-state {
            text-align: center;
            padding: var(--space-xl);
            color: var(--stone-500);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: var(--space-sm);
            opacity: 0.5;
        }

        /* ================================================
           动画
           ================================================ */
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* ================================================
           通知
           ================================================ */
        
        .toast {
            position: fixed;
            bottom: var(--space-lg);
            right: var(--space-lg);
            padding: var(--space-sm) var(--space-lg);
            background: var(--stone-900);
            color: white;
            border-radius: var(--radius-full);
            font-size: 0.9375rem;
            box-shadow: var(--shadow-xl);
            transform: translateY(100px);
            opacity: 0;
            transition: all var(--duration-normal) var(--ease-elegant);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* ================================================
           响应式
           ================================================ */
        
        @media (max-width: 600px) {
            .header-inner { padding: 0 var(--space-sm); height: 64px; }
            .logo-text { font-size: 1.25rem; }
            .logo-sub { display: none; }
            .compose-card, .post-card, .widget { padding: var(--space-md); }
            .stats-grid { grid-template-columns: repeat(4, 1fr); }
            .stat-value { font-size: 1.25rem; }
            .post-actions { flex-wrap: wrap; }
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--stone-100); }
        ::-webkit-scrollbar-thumb { background: var(--stone-300); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--stone-500); }
    </style>
</head>
<body>
    <!-- 头部 -->
    <header class="header">
        <div class="header-inner">
            <a href="#" class="logo">
                <div class="logo-mark">墙</div>
                <div>
                    <div class="logo-text">校园墙</div>
                    <div class="logo-sub">分享你的故事</div>
                </div>
            </a>
        </div>
    </header>

    <!-- 主内容 -->
    <div class="app">
        <main class="main">
            <div class="content">
                <!-- 发帖 -->
                <div class="compose-card">
                    <div class="compose-header">
                        <div class="compose-avatar">我</div>
                        <div>
                            <div class="compose-title">分享新鲜事</div>
                            <div class="compose-subtitle">记录校园生活的点滴</div>
                        </div>
                    </div>
                    
                    <div class="category-tabs">
                        <button class="category-tab active" data-category="日常">日常</button>
                        <button class="category-tab" data-category="表白">表白</button>
                        <button class="category-tab" data-category="失物">失物招领</button>
                        <button class="category-tab" data-category="吐槽">吐槽</button>
                        <button class="category-tab" data-category="求助">求助</button>
                        <button class="category-tab" data-category="二手">二手交易</button>
                    </div>
                    
                    <textarea class="compose-input" id="postInput" placeholder="分享你的校园生活、趣事、求助或表白..." maxlength="500"></textarea>
                    
                    <div class="compose-footer">
                        <div class="compose-tools">
                            <button class="compose-tool" title="图片">□</button>
                            <button class="compose-tool" title="话题">#</button>
                        </div>
                        <div style="display: flex; align-items: center; gap: var(--space-sm);">
                            <span class="char-count"><span id="charCount">0</span>/500</span>
                            <button class="btn btn-primary" id="submitPost">发布</button>
                        </div>
                    </div>
                </div>

                <!-- 排序 -->
                <div class="sort-bar">
                    <button class="sort-btn active" data-sort="newest">最新</button>
                    <button class="sort-btn" data-sort="popular">最热</button>
                </div>

                <!-- 帖子列表 -->
                <div class="posts" id="postsContainer"></div>
            </div>

            <!-- 侧边栏 -->
            <aside class="sidebar">
                <div class="widget">
                    <h3 class="widget-title">数据统计</h3>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="totalPosts">0</div>
                            <div class="stat-label">帖子</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="todayPosts">0</div>
                            <div class="stat-label">今日</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="totalLikes">0</div>
                            <div class="stat-label">点赞</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="totalComments">0</div>
                            <div class="stat-label">评论</div>
                        </div>
                    </div>
                </div>

                <div class="widget">
                    <h3 class="widget-title">热门话题</h3>
                    <div class="hot-tags">
                        <button class="hot-tag">期中考试</button>
                        <button class="hot-tag">食堂美食</button>
                        <button class="hot-tag">社团招新</button>
                        <button class="hot-tag">校园恋爱</button>
                        <button class="hot-tag">宿舍生活</button>
                        <button class="hot-tag">课程推荐</button>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- 通知 -->
    <div class="toast" id="toast"></div>

    <script>
        class CampusWall {
            constructor() {
                this.posts = [];
                this.currentCategory = '日常';
                this.currentSort = 'newest';
                this.init();
            }

            init() {
                this.loadPosts();
                this.bindEvents();
                this.renderPosts();
                this.updateStats();
            }

            loadPosts() {
                const saved = localStorage.getItem('campusWallPosts');
                if (saved) {
                    this.posts = JSON.parse(saved);
                } else {
                    this.posts = [
                        {
                            id: 1,
                            category: '表白',
                            content: '今天在图书馆看到一位穿白衬衫的男生，认真学习的样子好帅！有人认识吗？',
                            likes: 24,
                            comments: [
                                { content: '是计算机系的学霸吧！', time: '2小时前' },
                                { content: '我好像知道是谁', time: '1小时前' }
                            ],
                            liked: false,
                            time: Date.now() - 3600000
                        },
                        {
                            id: 2,
                            category: '失物',
                            content: '在操场捡到一把蓝色雨伞，失主请联系我领取～',
                            likes: 8,
                            comments: [],
                            liked: false,
                            time: Date.now() - 7200000
                        },
                        {
                            id: 3,
                            category: '吐槽',
                            content: '今天的高数课真的太难了，感觉脑子不够用。有没有一起复习的小伙伴？',
                            likes: 32,
                            comments: [
                                { content: '同感！一起组队复习吧', time: '3小时前' }
                            ],
                            liked: false,
                            time: Date.now() - 10800000
                        }
                    ];
                    this.savePosts();
                }
            }

            savePosts() {
                localStorage.setItem('campusWallPosts', JSON.stringify(this.posts));
            }

            bindEvents() {
                // 分类
                document.querySelectorAll('.category-tab').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.currentCategory = btn.dataset.category;
                    });
                });

                // 排序
                document.querySelectorAll('.sort-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.currentSort = btn.dataset.sort;
                        this.renderPosts();
                    });
                });

                // 发帖
                document.getElementById('submitPost').addEventListener('click', () => this.createPost());

                // 字数统计
                document.getElementById('postInput').addEventListener('input', (e) => {
                    document.getElementById('charCount').textContent = e.target.value.length;
                });

                // 话题
                document.querySelectorAll('.hot-tag').forEach(tag => {
                    tag.addEventListener('click', () => {
                        const input = document.getElementById('postInput');
                        input.value = `#${tag.textContent} `;
                        input.focus();
                        document.getElementById('charCount').textContent = input.value.length;
                    });
                });
            }

            createPost() {
                const content = document.getElementById('postInput').value.trim();
                if (!content) {
                    this.showToast('请输入内容！');
                    return;
                }

                this.posts.unshift({
                    id: Date.now(),
                    category: this.currentCategory,
                    content,
                    likes: 0,
                    comments: [],
                    liked: false,
                    time: Date.now()
                });

                this.savePosts();
                this.renderPosts();
                this.updateStats();
                document.getElementById('postInput').value = '';
                document.getElementById('charCount').textContent = '0';
                this.showToast('发布成功！');
            }

            renderPosts() {
                const container = document.getElementById('postsContainer');
                let sorted = [...this.posts];

                if (this.currentSort === 'newest') {
                    sorted.sort((a, b) => b.time - a.time);
                } else {
                    sorted.sort((a, b) => b.likes - a.likes);
                }

                if (sorted.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📝</div>
                            <h3>还没有帖子</h3>
                            <p>成为第一个分享的人吧！</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = sorted.map(post => `
                    <article class="post-card" data-id="${post.id}">
                        <div class="post-header">
                            <div class="post-author">
                                <div class="post-avatar">同</div>
                                <div class="post-meta">
                                    <span class="post-category">${post.category}</span>
                                    <span class="post-time">${this.getTimeAgo(post.time)}</span>
                                </div>
                            </div>
                        </div>
                        <div class="post-content">${this.escapeHtml(post.content)}</div>
                        <div class="post-actions">
                            <button class="post-action like-btn ${post.liked ? 'liked' : ''}" data-id="${post.id}">
                                <span class="action-icon">${post.liked ? '♥' : '♡'}</span>
                                <span>${post.likes}</span>
                            </button>
                            <button class="post-action comment-btn" data-id="${post.id}">
                                <span class="action-icon">💬</span>
                                <span>${post.comments.length}</span>
                            </button>
                            <button class="post-action share-btn" data-id="${post.id}">
                                <span class="action-icon">↗</span>
                                <span>分享</span>
                            </button>
                        </div>
                        <div class="comments" id="comments-${post.id}">
                            <div class="comment-input-row">
                                <input type="text" class="comment-input" placeholder="写下你的评论..." data-id="${post.id}">
                                <button class="btn btn-primary" style="padding: 10px 20px;" data-id="${post.id}">发送</button>
                            </div>
                            <div class="comment-list">
                                ${post.comments.map(c => `
                                    <div class="comment-item">
                                        <div>${this.escapeHtml(c.content)}</div>
                                        <div class="comment-time">${c.time}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </article>
                `).join('');

                this.bindPostEvents();
            }

            bindPostEvents() {
                // 点赞
                document.querySelectorAll('.like-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const postId = parseInt(btn.dataset.id);
                        const post = this.posts.find(p => p.id === postId);
                        if (post) {
                            post.liked = !post.liked;
                            post.likes += post.liked ? 1 : -1;
                            this.savePosts();
                            this.renderPosts();
                            this.updateStats();
                        }
                    });
                });

                // 评论
                document.querySelectorAll('.comment-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.getElementById(`comments-${btn.dataset.id}`).classList.toggle('show');
                    });
                });

                // 发送评论
                document.querySelectorAll('.comment-input').forEach(input => {
                    input.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            const postId = parseInt(input.dataset.id);
                            if (input.value.trim()) {
                                this.addComment(postId, input.value.trim());
                                input.value = '';
                            }
                        }
                    });
                });

                document.querySelectorAll('.comments .btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const postId = parseInt(btn.dataset.id);
                        const input = document.querySelector(`.comment-input[data-id="${postId}"]`);
                        if (input.value.trim()) {
                            this.addComment(postId, input.value.trim());
                            input.value = '';
                        }
                    });
                });

                // 分享
                document.querySelectorAll('.share-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const post = this.posts.find(p => p.id === parseInt(btn.dataset.id));
                        if (post) {
                            navigator.clipboard.writeText(post.content).then(() => {
                                this.showToast('内容已复制！');
                            });
                        }
                    });
                });
            }

            addComment(postId, content) {
                const post = this.posts.find(p => p.id === postId);
                if (post) {
                    post.comments.push({ content, time: '刚刚' });
                    this.savePosts();
                    this.renderPosts();
                    this.updateStats();
                    document.getElementById(`comments-${postId}`).classList.add('show');
                    this.showToast('评论成功！');
                }
            }

            updateStats() {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                document.getElementById('totalPosts').textContent = this.posts.length;
                document.getElementById('todayPosts').textContent = this.posts.filter(p => p.time >= today.getTime()).length;
                document.getElementById('totalLikes').textContent = this.posts.reduce((s, p) => s + p.likes, 0);
                document.getElementById('totalComments').textContent = this.posts.reduce((s, p) => s + p.comments.length, 0);
            }

            showToast(message) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }

            getTimeAgo(timestamp) {
                const diff = Date.now() - timestamp;
                const minutes = Math.floor(diff / 60000);
                const hours = Math.floor(diff / 3600000);
                const days = Math.floor(diff / 86400000);

                if (minutes < 1) return '刚刚';
                if (minutes < 60) return `${minutes}分钟前`;
                if (hours < 24) return `${hours}小时前`;
                if (days < 7) return `${days}天前`;
                return new Date(timestamp).toLocaleDateString('zh-CN');
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        document.addEventListener('DOMContentLoaded', () => new CampusWall());
    </script>
</body>
</html>
